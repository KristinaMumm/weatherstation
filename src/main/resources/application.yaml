spring:
  application:
    name: weatherstation

  datasource:
    url: ${MYSQL_URL}
    username: ${MYSQL_USER}
    password: ${MYSQL_PASSWORD}

  flyway:
    enabled: true
    locations: classpath:db/migration

openmeteo:
  base-url: https://api.open-meteo.com/v1/forecast

springdoc:
  swagger-ui:
    path: /docs
  api-docs:
    path: /api-docs

app:
  security:
    username: ${APP_ADMIN_USERNAME}
    password: ${APP_ADMIN_PASSWORD}
